zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: a571c0d144b14fd4a87a9d9b2aa9fcd6
      name: Templates/Applications
  templates:
    - uuid: 52837a3081ae49628525207b13d39ee3
      template: 'DNS Name Resolution'
      name: 'DNS Name Resolution'
      description: |
        This templates monitors the DNS name resolution success of an A record against a DNS server.
        
        A record and DNS server must be specified in macros.
        {$A_RECORD}
        {$DNS_SERVER}
      groups:
        - name: Templates/Applications
      items:
        - uuid: b424a9c55f2b4862ae29b070ad021d03
          name: 'DNS Resolver JSON'
          type: EXTERNAL
          key: 'dns-resolver.py["{$A_RECORD}","{$DNS_SERVER}"]'
          value_type: TEXT
          trends: '0'
        - uuid: a0af048c7b3d4d12a15eac3dc41115fa
          name: 'DNS Resolution Error'
          type: DEPENDENT
          key: dns.resolution.error
          delay: '0'
          value_type: TEXT
          trends: '0'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.error
          master_item:
            key: 'dns-resolver.py["{$A_RECORD}","{$DNS_SERVER}"]'
        - uuid: 783d3e4c75e7493ca0b555287193acd9
          name: 'DNS Resolution IP'
          type: DEPENDENT
          key: dns.resolution.ip
          delay: '0'
          value_type: TEXT
          trends: '0'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.ip
          master_item:
            key: 'dns-resolver.py["{$A_RECORD}","{$DNS_SERVER}"]'
        - uuid: 19365c728abf46e7ac6b408afc87dbc3
          name: 'DNS Resolution Response Time'
          type: DEPENDENT
          key: dns.resolution.responsetime
          delay: '0'
          value_type: FLOAT
          units: ms
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.response_time_ms
          master_item:
            key: 'dns-resolver.py["{$A_RECORD}","{$DNS_SERVER}"]'
        - uuid: ec562039bad5496eaa4984a8637d45a3
          name: 'DNS Resolution Success'
          type: DEPENDENT
          key: dns.resolution.success
          delay: '0'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.success
            - type: BOOL_TO_DECIMAL
              parameters:
                - ''
          master_item:
            key: 'dns-resolver.py["{$A_RECORD}","{$DNS_SERVER}"]'
          triggers:
            - uuid: 9478635061e8490f90071160aec42779
              expression: 'max(/DNS Name Resolution/dns.resolution.success,3m)=0'
              name: '"{$DNS_SERVER}" Failed to Resolve "{$A_RECORD}"'
              priority: HIGH
              manual_close: 'YES'
      macros:
        - macro: '{$A_RECORD}'
        - macro: '{$DNS_SERVER}'
