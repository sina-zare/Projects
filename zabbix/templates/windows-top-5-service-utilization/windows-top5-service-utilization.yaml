      discovery_rules:
        - uuid: 34084c20500240e69c9149f888acbbd4
          name: 'Top5 services CPU discovery'
          type: DEPENDENT
          key: services.top5cpu.discovery
          delay: '0'
          lifetime_type: DELETE_IMMEDIATELY
          lifetime: '0'
          item_prototypes:
            - uuid: 7f4bd7a2ee304d88a57c635cf2c76af4
              name: 'CPU % usage of {#PROCNAME}'
              type: DEPENDENT
              key: 'service.cpu[{#PROCNAME}]'
              delay: '0'
              history: 7d
              value_type: FLOAT
              trends: 90d
              units: '%'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      // Dynamic-key robust extractor — CPU prototype
                      var metric = 'CPU';
                      
                      try { var obj = JSON.parse(value); } catch (e) { return null; }
                      var arr = obj.data;
                      if (!Array.isArray(arr)) return null;
                      
                      // macro raw text
                      var rawPid = '{#PID}';
                      var rawName = '{#PROCNAME}';
                      var pidSub = !(typeof rawPid === 'string' && rawPid.indexOf('{#') === 0);
                      var nameSub = !(typeof rawName === 'string' && rawName.indexOf('{#') === 0);
                      var targetPid = pidSub ? String(rawPid) : null;
                      var targetName = nameSub ? String(rawName) : null;
                      
                      function findKeyByHints(o, hints) {
                        var keys = Object.keys(o || {});
                        hints = hints.map(function(h){ return h.toLowerCase(); });
                        for (var i=0;i<keys.length;i++) {
                          var k = keys[i];
                          var kl = k.toLowerCase();
                          for (var j=0;j<hints.length;j++) {
                            if (kl.indexOf(hints[j]) !== -1) return k;
                          }
                        }
                        return null;
                      }
                      
                      // Precompute keys for each element and try to match
                      for (var i=0;i<arr.length;i++){
                        var it = arr[i];
                        // find key names that contain 'pid' or '#pid'
                        var pidKey = findKeyByHints(it, ['#pid','pid']);
                        var nameKey = findKeyByHints(it, ['procname','proc','service','svcname','name']);
                        // normalize values
                        var pidVal = pidKey ? String(it[pidKey]) : null;
                        var nameVal = nameKey ? String(it[nameKey]) : null;
                      
                        if (targetPid && pidVal && pidVal === targetPid) {
                          var v = it[metric]; return (v === undefined || v === null) ? null : String(v);
                        }
                        if (targetName && nameVal && nameVal === targetName) {
                          var v2 = it[metric]; return (v2 === undefined || v2 === null) ? null : String(v2);
                        }
                      }
                      
                      // fallback: if macros not substituted (Test UI) and only one element present, return that element
                      if (!pidSub && !nameSub && arr.length === 1) {
                        var v3 = arr[0][metric]; return (v3 === undefined || v3 === null) ? null : String(v3);
                      }
                      
                      return null;
              master_item:
                key: services.top5cpu
              tags:
                - tag: target
                  value: services
          master_item:
            key: services.top5cpu
